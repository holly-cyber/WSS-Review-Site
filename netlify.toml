[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/"
  to = "/reviews/"
  status = 301
  force = true

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Give the AI proxy headroom for long streamed generations (default is 10s).
[functions."ai-proxy"]
  timeout = 26

[[redirects]]
  from = "/api/ai-proxy"
  to = "/.netlify/functions/ai-proxy"
  status = 200

[[redirects]]
  from = "/api/avelon-proxy"
  to = "/.netlify/functions/avelon-proxy"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200
