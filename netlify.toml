[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Admin surfaces change often — never serve a stale HTML shell, so the latest
# client bundle is always loaded.
[[headers]]
  for = "/console/*"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "/pipeline/*"
  [headers.values]
    Cache-Control = "no-cache"

# The pipeline is embedded as an iframe inside the console (same origin), so it
# must allow same-origin framing. The public site keeps the global DENY above.
[[headers]]
  for = "/pipeline"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
[[headers]]
  for = "/pipeline/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Give the AI proxy headroom for long streamed generations (default is 10s).
[functions."ai-proxy"]
  timeout = 26

[[redirects]]
  from = "/api/ai-proxy"
  to = "/.netlify/functions/ai-proxy"
  status = 200

[[redirects]]
  from = "/api/avelon-proxy"
  to = "/.netlify/functions/avelon-proxy"
  status = 200

[[redirects]]
